name = "ppc-bot"
main = "./src/index.ts"
compatibility_date = "2026-06-02"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 150

[vars]
WEBSITE_URL = "https://purduephotoclub.org"
WIKI_URL = "https://wiki.purduephotoclub.org"
# Bounded in code to 1-7 days. Keep in sync with the API Worker.
DISCORD_MIN_ACCOUNT_AGE_DAYS = "1"

[[services]]
binding = "API_WORKER"
service = "purdue-photography-club-api"

[[vpc_services]]
binding = "GATEWAY_SERVICE"
service_id = "019f3d9e-b57d-79d2-8e47-7598fdc54895"
remote = true

[[routes]]
pattern = "discord.purduephotoclub.org"
custom_domain = true
